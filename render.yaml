services:
  - type: web
    name: backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app:app --host 0.0.0.0 --port 8000
    envVars:
      - key: GEMINI_API_KEY
        scope: build,runtime

  - type: static_site
    name: frontend
    region: oregon
    plan: free
    staticPublishPath: ./frontend
    routes:
      - path: /*
        destination: /index.html
