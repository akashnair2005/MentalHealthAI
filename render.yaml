# Render Blueprint for Mental Health AI

# This blueprint defines a backend and frontend service

services:
  - type: web
    name: backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000

  - type: static
    name: frontend
    env: static
    staticDir: build
