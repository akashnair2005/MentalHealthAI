services:
  - type: web
    name: api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app:app --host 0.0.0.0 --port 8000
    envVars:
      - key: GEMINI_API_KEY
        value: your_api_key_here

  - type: web
    name: web
    env: python
    buildCommand: echo 'Frontend ready'
    startCommand: cd frontend && python -m http.server 8080
    envVars:
      - key: PORT
        value: '8080'
