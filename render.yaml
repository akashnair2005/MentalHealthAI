services:
  - type: web
    name: api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app:app --host 0.0.0.0 --port 8000

  - type: web
    name: web
    env: python
    plan: free
    buildCommand: echo Frontend ready
    startCommand: cd frontend && python -m http.server 8080
